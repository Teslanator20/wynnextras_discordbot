services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: wynnextras
      POSTGRES_DB: railway
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DATABASE_URL: postgresql://postgres:wynnextras@db:5432/railway

volumes:
  pgdata:
